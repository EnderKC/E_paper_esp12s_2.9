name: Build and Release Firmware

on:
  push:
    branches:
      - master
    paths:
      - include/version_config.h
      - .github/workflows/release-firmware.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  firmware:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: ${{ runner.os }}-platformio-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-platformio-

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install PlatformIO Core
        run: pip install --upgrade platformio

      - name: Prepare default secrets
        run: cp include/secrets.example.h include/secrets.h

      - name: Read firmware version
        id: version
        run: |
          set -euo pipefail

          extract_version() {
            sed -nE 's/^#define[[:space:]]+APP_VERSION[[:space:]]+"([^"]+)".*/\1/p' "$1" | head -n 1
          }

          current_version="$(extract_version include/version_config.h)"
          if [ -z "${current_version}" ]; then
            echo "APP_VERSION not found in include/version_config.h" >&2
            exit 1
          fi

          if ! printf '%s' "${current_version}" | grep -Eq '^v[0-9]+(\.[0-9]+){2}([-.][0-9A-Za-z.-]+)?$'; then
            echo "APP_VERSION must look like v1.2.3, got: ${current_version}" >&2
            exit 1
          fi

          previous_version=""
          if [ "${GITHUB_EVENT_NAME}" = "push" ] && git cat-file -e "${{ github.event.before }}^{commit}" 2>/dev/null; then
            git show "${{ github.event.before }}:include/version_config.h" > /tmp/previous_version_config.h 2>/dev/null || true
            if [ -s /tmp/previous_version_config.h ]; then
              previous_version="$(extract_version /tmp/previous_version_config.h || true)"
            fi
          fi

          changed="true"
          if [ "${GITHUB_EVENT_NAME}" = "push" ] && [ "${current_version}" = "${previous_version}" ]; then
            changed="false"
          fi

          {
            echo "version=${current_version}"
            echo "previous_version=${previous_version}"
            echo "changed=${changed}"
          } >> "${GITHUB_OUTPUT}"

          echo "Current firmware version: ${current_version}"
          echo "Previous firmware version: ${previous_version:-<none>}"
          echo "Version changed: ${changed}"

      - name: Check GitHub release state
        id: github_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          if gh release view "${VERSION}" >/dev/null 2>&1; then
            echo "exists=true" >> "${GITHUB_OUTPUT}"
            echo "GitHub Release ${VERSION} already exists; build will continue for artifact/Gitee sync."
          else
            echo "exists=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Build firmware
        run: pio run -e esp12e

      - name: Prepare firmware artifacts
        env:
          GITEE_REPOSITORY: enderkc/e_paper_esp12s_2.9
          VERSION: ${{ steps.version.outputs.version }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          mkdir -p artifacts
          cp .pio/build/esp12e/firmware.bin artifacts/firmware.bin

          python3 - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path

          firmware = Path("artifacts/firmware.bin")
          data = firmware.read_bytes()
          version = os.environ["VERSION"]
          gitee_repository = os.environ["GITEE_REPOSITORY"]
          bin_url = f"https://gitee.com/{gitee_repository}/releases/download/{version}/firmware.bin"

          md5 = hashlib.md5(data).hexdigest()
          sha256 = hashlib.sha256(data).hexdigest()

          manifest = {
              "version": version,
              "commit": os.environ["SHA"],
              "bin": bin_url,
              "size": len(data),
              "md5": md5,
              "sha256": sha256,
          }

          Path("artifacts/manifest.json").write_text(
              json.dumps(manifest, indent=2) + "\n",
              encoding="utf-8",
          )
          Path("artifacts/firmware.md5").write_text(
              f"{md5}  firmware.bin\n",
              encoding="utf-8",
          )
          PY

          {
            echo "Firmware build for ${VERSION}"
            echo
            echo "- Commit: ${SHA}"
            echo "- Artifact: firmware.bin"
          } > artifacts/release-notes.md

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ steps.version.outputs.version }}
          path: |
            artifacts/firmware.bin
            artifacts/manifest.json
            artifacts/firmware.md5

      - name: Create GitHub Release
        if: steps.github_release.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          gh release create "${VERSION}" \
            artifacts/firmware.bin \
            artifacts/manifest.json \
            artifacts/firmware.md5 \
            --target "${GITHUB_SHA}" \
            --title "${VERSION}" \
            --notes-file artifacts/release-notes.md

      - name: Sync Gitee Release
        uses: nicennnnnnnlee/action-gitee-release@master
        with:
          gitee_owner: enderkc
          gitee_repo: e_paper_esp12s_2.9
          gitee_token: ${{ secrets.GITEE_TOKEN }}
          gitee_tag_name: ${{ steps.version.outputs.version }}
          gitee_release_name: ${{ steps.version.outputs.version }}
          gitee_release_body: artifacts/release-notes.md
          gitee_target_commitish: master
          gitee_files: |
            artifacts/firmware.bin
            artifacts/manifest.json
            artifacts/firmware.md5
